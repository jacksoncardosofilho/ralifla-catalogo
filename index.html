<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Catálogo | Ralifla & Rúbia</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" data-cfasync="false"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" data-cfasync="false"></script>

    <script>
        // --- CONFIGURAÇÃO DO SUPABASE ---
        const SUPABASE_URL = 'https://knzibuqsozujmuxdzymn.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_GDsNoWduvz-62UOCs_r85Q_WIUE-koh';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        document.addEventListener('alpine:init', () => {
            Alpine.data('catalogo', () => ({
                produtos: [],
                carregando: true,
                
                // Filtros ativos
                filtroPublico: 'Todos',
                filtroCategoria: 'Todas',
                
                // Opções de botões
                opcoesPublico: ['Todos', 'Feminino', 'Masculino', 'Infantil'],
                opcoesCategoria: ['Todas', 'Anéis', 'Brincos', 'Colares', 'Pulseiras', 'Tornozeleiras'],

                // Controle do popup de imagem
                modalImagem: { aberto: false, codigo: '', nome: '' },
                
                abrirImagem(produto) {
                    this.modalImagem.codigo = this.removerZeros(produto.codigo_interno);
                    this.modalImagem.nome = produto.nome;
                    this.modalImagem.aberto = true;
                },

                async init() {
                    try {
                        // Chama a sua função perfeitamente criada!
                        const { data, error } = await supabaseClient.rpc('listar_catalogo_online');
                        if (error) throw error;
                        
                        this.produtos = data || [];
                    } catch (e) {
                        alert("Erro ao carregar o catálogo: " + e.message);
                    } finally {
                        this.carregando = false;
                    }
                },

                // Lógica mágica que filtra os produtos na tela em tempo real
                get produtosFiltrados() {
                    return this.produtos.filter(p => {
                        // Trata nulos caso a peça ainda não tenha categoria cadastrada
                        const pub = p.publico ? p.publico.toLowerCase() : '';
                        const cat = p.categoria ? p.categoria.toLowerCase() : '';
                        
                        const matchPublico = this.filtroPublico === 'Todos' || pub === this.filtroPublico.toLowerCase();
                        const matchCategoria = this.filtroCategoria === 'Todas' || cat === this.filtroCategoria.toLowerCase();
                        
                        return matchPublico && matchCategoria;
                    });
                },

                formatarMoeda(v) { 
                    return new Intl.NumberFormat('pt-BR', {style:'currency', currency:'BRL'}).format(v||0); 
                },

                // Remove os zeros à esquerda do código
                removerZeros(codigo) {
                    if (!codigo) return '';
                    return codigo.toString().replace(/^0+/, '');
                },
                
                // Gera uma imagem genérica bonita baseada no nome da peça (já que ainda não temos upload de fotos)
                gerarImagemPlaceholder(nome) {
                    const iniciais = nome.substring(0, 2).toUpperCase();
                    return `https://ui-avatars.com/api/?name=${iniciais}&background=f3e8ff&color=7e22ce&size=400&font-size=0.3`;
                }
            }));
        });
    </script>
</head>
<body class="bg-gray-50 text-gray-800 pb-10" x-data="catalogo">

    <header class="bg-purple-800 text-white p-6 shadow-md rounded-b-3xl sticky top-0 z-50">
        <div class="container mx-auto max-w-4xl flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold tracking-wide">💎 Catálogo Exclusivo</h1>
                <p class="text-purple-200 text-sm mt-1">Peças disponíveis a pronta entrega</p>
            </div>
            <div class="bg-purple-900 px-3 py-1 rounded-full text-xs font-bold border border-purple-700">
                <span x-text="produtosFiltrados.length"></span> peças
            </div>
        </div>
    </header>

    <div x-show="carregando" class="flex flex-col items-center justify-center mt-20">
        <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-purple-600 mb-4"></div>
        <p class="text-purple-700 font-bold animate-pulse">Buscando as joias mais lindas...</p>
    </div>

    <main x-show="!carregando" class="container mx-auto px-4 max-w-4xl mt-6" style="display: none;">
        
        <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 mb-6 space-y-4">
            
            <div>
                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Para quem?</p>
                <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                    <template x-for="pub in opcoesPublico" :key="pub">
                        <button @click="filtroPublico = pub" 
                                :class="filtroPublico === pub ? 'bg-purple-600 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                                class="px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-all duration-200">
                            <span x-text="pub"></span>
                        </button>
                    </template>
                </div>
            </div>

            <div>
                <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Qual tipo de joia?</p>
                <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                    <template x-for="cat in opcoesCategoria" :key="cat">
                        <button @click="filtroCategoria = cat" 
                                :class="filtroCategoria === cat ? 'bg-purple-600 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'"
                                class="px-4 py-2 rounded-full text-sm font-bold whitespace-nowrap transition-all duration-200">
                            <span x-text="cat"></span>
                        </button>
                    </template>
                </div>
            </div>
        </div>

        <div x-show="produtosFiltrados.length === 0" class="text-center py-20">
            <div class="text-6xl mb-4">🥺</div>
            <h3 class="text-xl font-bold text-gray-700">Poxa, não achamos nada!</h3>
            <p class="text-gray-500 mt-2 text-sm">Nenhuma peça encontrada com esses filtros.</p>
            <button @click="filtroPublico = 'Todos'; filtroCategoria = 'Todas'" class="mt-4 text-purple-600 font-bold hover:underline">Limpar Filtros</button>
        </div>

        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
            <template x-for="produto in produtosFiltrados" :key="produto.produto_id">
                <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col hover:shadow-lg transition-shadow duration-300 relative group">
                    
                    <div class="absolute top-2 right-2 bg-white/90 backdrop-blur text-purple-800 text-[10px] font-bold px-2 py-1 rounded-lg shadow-sm z-10">
                        Restam <span x-text="produto.em_estoque"></span>
                    </div>

                    <div class="aspect-square bg-gray-50 relative overflow-hidden cursor-pointer group" @click="abrirImagem(produto)">
                        <img :src="'https://knzibuqsozujmuxdzymn.supabase.co/storage/v1/object/public/joias/' + removerZeros(produto.codigo_interno) + '.webp'" 
                             @error="$el.src = gerarImagemPlaceholder(produto.nome)"
                             alt="Foto da Joia" 
                             class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        
                        <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-20 transition-all flex items-center justify-center">
                            <svg class="text-white opacity-0 group-hover:opacity-100 drop-shadow-md transition-opacity duration-300" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
                        </div>
                    </div>

                    <!-- <div class="aspect-square bg-gray-50 relative overflow-hidden">
                        <img :src="gerarImagemPlaceholder(produto.nome)" alt="Foto da Joia" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    </div> -->

                    <div class="p-4 flex flex-col flex-1">
                        <div class="flex gap-1 mb-2 flex-wrap">
                            <span x-show="produto.publico" class="text-[9px] uppercase tracking-wider font-bold bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded" x-text="produto.publico"></span>
                            <span x-show="produto.categoria" class="text-[9px] uppercase tracking-wider font-bold bg-purple-50 text-purple-500 px-1.5 py-0.5 rounded" x-text="produto.categoria"></span>
                        </div>
                        
                        <h3 class="text-sm font-bold text-gray-800 leading-tight mb-1 flex-1" x-text="produto.nome"></h3>
                        <p class="text-[10px] text-gray-400 font-mono mb-3" x-text="'Cód: ' + produto.codigo_interno"></p>
                        
                        <div class="flex justify-between items-end mt-auto">
                            <span class="text-lg font-extrabold text-purple-700" x-text="formatarMoeda(produto.preco_venda_atual)"></span>
                        </div>

                        <a :href="'https://wa.me/5548999779800?text=Oi%20R%C3%BAbia!%20Gostei%20desta%20pe%C3%A7a:%20' + produto.nome + '%20(C%C3%B3d:%20' + produto.codigo_interno + ')'" 
                           target="_blank"
                           class="mt-3 block text-center w-full bg-green-500 hover:bg-green-600 text-white text-xs font-bold py-2 rounded-xl transition-colors shadow-sm">
                            Quero esta! 🛒
                        </a>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

    <div x-show="modalImagem.aberto" class="fixed inset-0 z-[60] flex items-center justify-center bg-black bg-opacity-65 backdrop-blur-sm p-4 sm:p-6" style="display: none;" x-transition.opacity>
        <div class="relative w-full max-w-lg bg-white rounded-2xl shadow-2xl overflow-hidden flex flex-col" @click.away="modalImagem.aberto = false" x-transition:enter="translate-y-10 scale-95" x-transition:enter-end="translate-y-0 scale-100">
            
            <button @click="modalImagem.aberto = false" class="absolute top-3 right-3 bg-black bg-opacity-60 hover:bg-opacity-90 text-white rounded-full p-2 z-10 transition-all shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>

            <div class="bg-gray-100 flex items-center justify-center relative min-h-[300px]">
                <img :src="'https://knzibuqsozujmuxdzymn.supabase.co/storage/v1/object/public/joias/' + modalImagem.codigo + '.webp'" 
                     @error="$el.src = gerarImagemPlaceholder(modalImagem.nome)"
                     :alt="modalImagem.nome"
                     class="w-full max-h-[70vh] object-contain">
            </div>
            
            <div class="p-5 bg-white text-center border-t border-gray-100">
                <h3 class="font-bold text-gray-800 text-lg md:text-xl" x-text="modalImagem.nome"></h3>
                <p class="text-sm text-gray-400 mt-1 font-mono" x-text="'Cód: ' + modalImagem.codigo"></p>
            </div>
        </div>
    </div>

</body>
</html>
